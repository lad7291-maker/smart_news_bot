# Конфигурация скоринга новостей
# Изменения применяются без перезапуска бота (hot-reload по SIGHUP или раз в 60 секунд)

# Максимальная сумма boost-баллов для одной новости (предотвращает перекос)
max_boost_total: 10.0

# Диапазон допустимых значений source_score
source_score_range: [1, 10]

# === БАЗОВЫЕ БАЛЛЫ ДЛЯ ИСТОЧНИКОВ ===
source_scores:
  # Русскоязычные
  Interfax: 5
  Security: 4
  RT: 5
  RIA: 5
  VC: 3
  Science: 2
  # Финансы / Крипто
  CoinTelegraph: 5
  CoinDesk: 5
  CNBC_World: 5
  NYT_Business: 5
  NYT_Economy: 5
  NYT_DealBook: 4
  Investing: 5
  NYT_Tech: 4

