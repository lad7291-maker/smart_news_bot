name: CI/CD — Smart News Bot

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: 🧪 Tests & Lint
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 📦 Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 pytest pytest-asyncio

      - name: 🔍 Lint (flake8)
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: 🧪 Tests
        run: pytest tests/ -v --tb=short -x || true
        env:
          PYTHONPATH: ${{ github.workspace }}

  deploy:
    name: 🚀 Deploy to VPS
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - name: 🚀 SSH Deploy
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            cd ${{ secrets.VPS_DEPLOY_PATH || '/root/smart_news_bot' }}
            git fetch origin
            git reset --hard origin/$(git rev-parse --abbrev-ref HEAD)
            source venv/bin/activate
            pip install -r requirements.txt -q
            pkill -f bot_runner || true
            sleep 2
            nohup python3 bot_runner.py > /var/log/bot_runner.log 2>&1 &
            echo "✅ Deployed at $(date)"
            sleep 2
            ps aux | grep bot_runner | grep -v grep
